<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Padel Event Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<main class="app">

  <div class="section-label">MARCADOR</div>

  <section class="header-row">
    <div class="scoreboard">
      <div class="score-line">
        <span>Nosotros</span>
        <strong id="our-games">0</strong>
        <strong id="our-points">0</strong>
      </div>
      <div class="score-line">
        <span>Rivales</span>
        <strong id="rival-games">0</strong>
        <strong id="rival-points">0</strong>
      </div>
    </div>

    <select id="deuce-mode">
      <option value="ADVANTAGE">Ventajas</option>
      <option value="GOLDEN_POINT">P. oro</option>
    </select>
  </section>

  <div class="section-label">CRONÓMETRO</div>

  <section class="crono-row">
    <button id="toggle-crono">▶</button>
    <div id="crono-display">00:00</div>
    <button id="minus-crono">-5s</button>
    <button id="plus-crono">+5s</button>
  </section>

  <div class="section-label blue-label">SERVICIO Y RALLY</div>

  <section class="service-rally-row blue-block">
    <div class="service-group">
      <button id="server-toggle" class="toggle-btn active" data-value="J1">Saca J1</button>
      <button id="serve-number-toggle" class="toggle-btn active" data-value="1">1º</button>
    </div>

    <div class="service-divider"></div>

    <button id="rally-toggle" class="toggle-btn active" data-value="MENOS_3">R:&lt;3</button>
  </section>

  <div class="section-label">ZONA NF RIVAL</div>

  <section class="court">
    <button class="court-zone" data-zone="RED">RED</button>
    <button class="court-zone" data-zone="MEDIO">MEDIO</button>
    <button class="court-zone" data-zone="FONDO">FONDO</button>
  </section>

  <div class="section-label">CATEGORÍA GOLPE</div>
  <section class="category-buttons" id="category-buttons"></section>

  <div class="section-label">REVÉS</div>
  <section class="register-grid">
    <div class="register-column winner-col">
      <div class="register-title">G-W/F</div>
      <div class="register-counter" id="counter-j1-win">0</div>
      <section class="stroke-buttons" id="stroke-buttons-j1-win"></section>
    </div>
    <div class="register-column nf-col">
      <div class="register-title">P-NF</div>
      <div class="register-counter" id="counter-j1-nf">0</div>
      <section class="stroke-buttons" id="stroke-buttons-j1-nf"></section>
    </div>
    <div class="register-column lost-col">
      <div class="register-title">P-W/F</div>
      <div class="register-counter" id="counter-j1-lost">0</div>
      <section class="stroke-buttons" id="stroke-buttons-j1-lost"></section>
    </div>
  </section>

  <div class="section-label">DERECHA</div>
  <section class="register-grid">
    <div class="register-column winner-col">
      <div class="register-title">G-W/F</div>
      <div class="register-counter" id="counter-j2-win">0</div>
      <section class="stroke-buttons" id="stroke-buttons-j2-win"></section>
    </div>
    <div class="register-column nf-col">
      <div class="register-title">P-NF</div>
      <div class="register-counter" id="counter-j2-nf">0</div>
      <section class="stroke-buttons" id="stroke-buttons-j2-nf"></section>
    </div>
    <div class="register-column lost-col">
      <div class="register-title">P-W/F</div>
      <div class="register-counter" id="counter-j2-lost">0</div>
      <section class="stroke-buttons" id="stroke-buttons-j2-lost"></section>
    </div>
  </section>

  <section class="last-event" id="last-event">Sin eventos</section>

  <section class="bottom-row bottom-row-5">
    <span>Eventos: <strong id="event-count">0</strong></span>
    <a class="nav-btn" href="dashboard.html" target="_blank">Dash</a>
    <button id="reset-crono">Reset</button>
    <button id="undo-btn" disabled>Undo</button>
    <button id="export-btn" disabled>CSV</button>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
